<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破茧成长 - 排序游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .rule {
            text-align: center;
            margin-bottom: 25px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .draggable {
            background: white;
            padding: 14px 16px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            cursor: grab;
            user-select: none;
            transition: all 0.2s ease;
            border-left: 5px solid #3498db;
            font-size: 15px;
            line-height: 1.5;
            touch-action: none;
        }

        .draggable:active {
            cursor: grabbing;
        }

        .draggable.dragging {
            opacity: 0.5;
            transform: scale(1.01);
        }

        .check-btn {
            margin: 25px auto;
            padding: 12px 28px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: block;
        }

        .result {
            text-align: center;
            font-size: 17px;
            font-weight: bold;
            margin-top: 15px;
        }

        .success {
            color: #27ae60;
        }

        .fail {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="title">三、破茧成长：跳出“舒适圈”的00后</div>
    <div class="rule">
        游戏规则：<br>
        1. 长按段落拖动排序<br>
        2. 排好后点击【检查答案】
    </div>

    <div class="container" id="container"></div>
    <button class="check-btn" onclick="checkAnswer()">检查答案</button>
    <div class="result" id="result"></div>

    <script>
        // 原文一字不差 · 共7段
        const data = [
            { id: 1, text: "三、破茧成长：跳出“舒适圈”的00后" },
            { id: 2, text: "就这样，我的青春故事在秭归续写，作为社会学专业的学生，我被分到了党群工作岗。刚来时，我格外担心我的工作容易“浮于表面”，日常写写材料、搞搞活动，不直接碰工程、不直接出数据，那不就是“可有可无”吗？但这一年参与的具体事务，彻底扭转了我的看法。" },
            { id: 3, text: "印象深刻的是，第一次独立起草党员突击队方案，领导要求紧扣年度重点任务——“进厂房、填大坝、收边坡、保度汛”。四个词，我只听得懂“大坝”。" },
            { id: 4, text: "方案不会写，就去学。敲开工程部的门，摊开图纸，一个一个问。主任拿起笔，画给我看：厂房在哪，大坝怎么填，边坡怎么收。那是我第一次觉得，图纸上的线条不是冷冰冰的符号，是我们正在打拼的战场。" },
            { id: 5, text: "后来，工程月例会我一场不落。听不懂的就记，记了几十页，回来一个一个查。半年下来，那些词不再是我听不懂的黑话，是写方案时能落地的抓手。" },
            { id: 6, text: "方案通过那天，主任拍了拍我肩膀：“小姑娘，像是干过工程的。”" },
            { id: 7, text: "就是这轻轻一拍，把我从“可有可无”的自我怀疑里，拍醒了。我不再觉得自己是旁观者，而是真正成为了重大工程不可或缺的一份子。我在服务大局中找准定位，在凝聚力量中实现成长，我的青春，终于在国家工程一线，找到了最扎实的价值。" }
        ];

        const correctOrder = [1,2,3,4,5,6,7];
        let list = [...data].sort(() => Math.random() - 0.5);
        const container = document.getElementById("container");
        const result = document.getElementById("result");

        // 渲染
        function render() {
            container.innerHTML = "";
            list.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "draggable";
                div.dataset.index = index;
                div.innerText = item.text;
                container.appendChild(div);
            });
            initDrag();
        }

        // 电脑 + 手机 双端拖拽
        function initDrag() {
            const items = document.querySelectorAll(".draggable");
            let dragIndex = null;

            items.forEach((item, i) => {
                // 电脑端
                item.ondragstart = (e) => {
                    dragIndex = parseInt(item.dataset.index);
                    item.classList.add("dragging");
                };
                item.ondragover = (e) => e.preventDefault();
                item.ondrop = (e) => {
                    e.preventDefault();
                    const dropIndex = parseInt(item.dataset.index);
                    if (dragIndex !== dropIndex) {
                        const moved = list.splice(dragIndex, 1);
                        list.splice(dropIndex, 0, ...moved);
                        render();
                    }
                };
                item.ondragend = () => item.classList.remove("dragging");

                // 手机端（核心修复）
                item.ontouchstart = (e) => {
                    e.preventDefault();
                    dragIndex = parseInt(item.dataset.index);
                    item.classList.add("dragging");
                };
                item.ontouchmove = (e) => e.preventDefault();
                item.ontouchend = (e) => {
                    e.preventDefault();
                    const touch = e.changedTouches[0];
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    if (target && target.classList.contains("draggable")) {
                        const dropIndex = parseInt(target.dataset.index);
                        if (dragIndex !== dropIndex) {
                            const moved = list.splice(dragIndex, 1);
                            list.splice(dropIndex, 0, ...moved);
                        }
                    }
                    item.classList.remove("dragging");
                    render();
                };
            });
        }

        // 检查答案
        function checkAnswer() {
            const user = list.map(i => i.id);
            const ok = JSON.stringify(user) === JSON.stringify(correctOrder);
            
            if (ok) {
                result.className = "result success";
                result.innerText = "✅ 排序完全正确！";
            } else {
                result.className = "result fail";
                result.innerText = "❌ 顺序不对，再调整一下吧～";
            }
        }

        render();
    </script>
</body>
</html>
